<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tab Snapshot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="app-header">
      <!-- Brand mark: two overlapping rounded cards = a "stack of snapshots". -->
      <span class="app-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <rect class="mark-back" x="7" y="3" width="14" height="14" rx="3" />
          <rect class="mark-front" x="3" y="7" width="14" height="14" rx="3" />
        </svg>
      </span>
      <h1 class="app-title">Tab Snapshot</h1>
    </header>

    <!-- The name is OPTIONAL now: leaving it blank auto-generates one, so this
         input no longer has the `required` attribute. -->
    <form id="save-form" class="save-form" autocomplete="off">
      <input
        id="session-name"
        class="text-input"
        type="text"
        placeholder="Name this session… (optional)"
        maxlength="60"
      />
      <button id="save-btn" class="btn btn-primary" type="submit">
        <span id="save-btn-label">Save</span>
      </button>
    </form>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <section class="sessions">
      <h2 class="sessions-heading">Saved sessions</h2>

      <!-- Search appears only when there are 5+ sessions (toggled by popup.js). -->
      <div id="search-wrap" hidden>
        <input
          id="search"
          class="search-input"
          type="text"
          placeholder="Search sessions…"
          aria-label="Search sessions"
        />
      </div>

      <ul id="session-list" class="session-list"></ul>

      <!-- Shown when a search matches nothing (distinct from the empty state). -->
      <p id="no-matches" class="no-matches" hidden>No sessions match your search.</p>

      <!-- Designed empty state, shown by popup.js only when there are 0 sessions. -->
      <div id="empty-state" class="empty-state">
        <svg
          class="empty-icon"
          viewBox="0 0 24 24"
          width="34"
          height="34"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="3" y="7" width="18" height="13" rx="2" />
          <path d="M3 11h18" />
          <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
        <p class="empty-title">No sessions yet</p>
        <p class="empty-sub">Save your first one above.</p>
      </div>
    </section>

    <!-- Backup tools. Export/Import need NO extra permission (see popup.js). -->
    <footer class="app-footer">
      <button id="export-btn" class="btn-ghost" type="button">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3v12" /><path d="M7 10l5 5 5-5" /><path d="M5 21h14" />
        </svg>
        Export
      </button>
      <button id="import-btn" class="btn-ghost" type="button">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M12 15V3" /><path d="M7 8l5-5 5 5" /><path d="M5 21h14" />
        </svg>
        Import
      </button>
      <!-- Hidden file input; the Import button clicks it to open the picker. -->
      <input id="import-input" type="file" accept="application/json" hidden />
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
