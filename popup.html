<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tab Snapshot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="app-header">
      <!-- Brand mark: same design as the toolbar icon (icons/*.png) — an amber
           tile holding a slate snapshot "frame". The viewBox copies icon16's
           exact geometry so popup and toolbar always match. -->
      <span class="app-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" width="22" height="22">
          <rect class="mark-tile" width="16" height="16" rx="4" />
          <rect class="mark-frame" x="5" y="5" width="6" height="6" rx="1.5" />
        </svg>
      </span>
      <h1 class="app-title">Tab Snapshot</h1>
      <!-- Opens the bundled support page (support.html) in a new tab. -->
      <button
        id="support-btn"
        class="support-btn"
        type="button"
        title="Support Tab Snapshot ♥"
        aria-label="Support Tab Snapshot"
      >
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
        Support
      </button>
    </header>

    <!-- The name is OPTIONAL now: leaving it blank auto-generates one, so this
         input no longer has the `required` attribute. -->
    <form id="save-form" class="save-form" autocomplete="off">
      <input
        id="session-name"
        class="text-input"
        type="text"
        placeholder="Name this session… (optional)"
        maxlength="60"
      />
      <button id="save-btn" class="btn btn-primary" type="submit">
        <span id="save-btn-label">Save</span>
      </button>
    </form>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <section class="sessions">
      <h2 class="sessions-heading">Saved sessions</h2>

      <!-- Search appears only when there are 5+ sessions (toggled by popup.js). -->
      <div id="search-wrap" hidden>
        <input
          id="search"
          class="search-input"
          type="text"
          placeholder="Search sessions…"
          aria-label="Search sessions"
        />
      </div>

      <ul id="session-list" class="session-list"></ul>

      <!-- Shown when a search matches nothing (distinct from the empty state). -->
      <p id="no-matches" class="no-matches" hidden>No sessions match your search.</p>

      <!-- Designed empty state, shown by popup.js only when there are 0 sessions. -->
      <div id="empty-state" class="empty-state">
        <svg
          class="empty-icon"
          viewBox="0 0 24 24"
          width="34"
          height="34"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="3" y="7" width="18" height="13" rx="2" />
          <path d="M3 11h18" />
          <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
        <p class="empty-title">No sessions yet</p>
        <p class="empty-sub">Save your first one above.</p>
      </div>
    </section>

    <!-- Value-moment nudge: hidden by default. popup.js shows it (at most
         once per 14 days, never after 2 dismissals) on the popup open that
         follows a session restore. -->
    <div id="nudge" class="nudge" hidden>
      <p id="nudge-text" class="nudge-text"></p>
      <button id="nudge-support" class="nudge-support" type="button">Support ♥</button>
      <button id="nudge-close" class="nudge-close" type="button" title="Dismiss" aria-label="Dismiss">✕</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
